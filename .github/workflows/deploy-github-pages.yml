# Build with correct asset base (/three-dreams/) and deploy dist.
# GitHub Pages does not run Vite; linked @base/* packages are built from vue-three-base-packages.
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Opt into Node.js 24 for JS actions (checkout, deploy-pages, etc.); see GitHub deprecation of Node 20.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  # Queue instead of cancel: cancelling mid-flight leaves a stale github-pages artifact
  # from the completed build job, which causes deploy-pages to fail with "Artifact count is 2".
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app
        uses: actions/checkout@v4
        with:
          path: three-dreams

      - name: Checkout @base workspace (pnpm link:../SHARED/…)
        uses: actions/checkout@v4
        with:
          repository: komogortev/vue-three-base-packages
          path: SHARED

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: |
            three-dreams/pnpm-lock.yaml
            SHARED/pnpm-lock.yaml

      - name: Install and build @base packages
        run: pnpm install --frozen-lockfile && pnpm build
        working-directory: SHARED

      - name: Install app
        run: pnpm install --frozen-lockfile
        working-directory: three-dreams

      - name: Build app
        run: pnpm run build
        working-directory: three-dreams
        env:
          VITE_BASE_PATH: /three-dreams/

      # v3 includes dotfiles (e.g. .nojekyll); v4 omits them by default.
      - uses: actions/upload-pages-artifact@v3
        with:
          path: three-dreams/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
